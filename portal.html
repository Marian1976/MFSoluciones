<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MFSoluciones | Portal Admin</title>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=IBM+Plex+Sans:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root {
            --bg: #0a0e1a; --surface: #111827; --surface2: #1a2236;
            --border: #1e2d45; --accent: #00d4ff; --accent2: #7c3aed;
            --green: #10b981; --red: #ef4444; --yellow: #f59e0b;
            --text: #e2e8f0; --muted: #64748b;
            --font-mono: 'IBM Plex Mono', monospace; --font: 'IBM Plex Sans', sans-serif;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: var(--bg); color: var(--text); font-family: var(--font); min-height: 100vh; display: flex; }

        /* SIDEBAR */
        .sidebar { width: 240px; background: var(--surface); border-right: 1px solid var(--border); display: flex; flex-direction: column; position: fixed; height: 100vh; z-index: 100; }
        .logo { padding: 24px 20px; border-bottom: 1px solid var(--border); }
        .logo h1 { font-size: 18px; font-weight: 700; color: var(--accent); font-family: var(--font-mono); letter-spacing: -0.5px; }
        .logo span { color: var(--text); }
        .logo p { font-size: 11px; color: var(--muted); margin-top: 2px; font-family: var(--font-mono); }
        .nav { flex: 1; padding: 16px 12px; }
        .nav-item { display: flex; align-items: center; gap: 10px; padding: 10px 12px; border-radius: 8px; cursor: pointer; color: var(--muted); font-size: 14px; font-weight: 500; transition: all 0.2s; margin-bottom: 4px; border: none; background: none; width: 100%; text-align: left; }
        .nav-item:hover { background: var(--surface2); color: var(--text); }
        .nav-item.active { background: rgba(0, 212, 255, 0.1); color: var(--accent); border: 1px solid rgba(0, 212, 255, 0.2); }
        .nav-item i { width: 16px; text-align: center; }
        .nav-section { font-size: 10px; font-family: var(--font-mono); color: var(--muted); padding: 8px 12px 4px; letter-spacing: 1px; text-transform: uppercase; }

        /* FOOTER SIDEBAR */
        .sidebar-footer { padding: 16px 12px; border-top: 1px solid var(--border); }
        .user-info { display: flex; align-items: center; gap: 10px; padding: 10px 12px; background: var(--surface2); border-radius: 8px; margin-bottom: 8px; }
        .avatar { width: 32px; height: 32px; background: linear-gradient(135deg, var(--accent), var(--accent2)); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 700; color: white; flex-shrink: 0; }
        .user-info .name { font-size: 13px; font-weight: 600; }
        .user-info .role { font-size: 11px; color: var(--muted); }
        .logout-btn { width: 100%; padding: 8px; background: rgba(239, 68, 68, 0.1); border: 1px solid rgba(239, 68, 68, 0.2); color: var(--red); border-radius: 6px; cursor: pointer; font-size: 13px; transition: all 0.2s; }
        .logout-btn:hover { background: rgba(239, 68, 68, 0.2); }

        /* MAIN CONTENT */
        .main { margin-left: 240px; flex: 1; display: flex; flex-direction: column; }
        .topbar { background: var(--surface); border-bottom: 1px solid var(--border); padding: 16px 32px; display: flex; align-items: center; justify-content: space-between; }
        .page-title { font-size: 20px; font-weight: 700; }
        .page-subtitle { font-size: 13px; color: var(--muted); margin-top: 2px; }
        .content { padding: 32px; flex: 1; }
        .section { display: none; }
        .section.active { display: block; }

        /* STATS & TABLES */
        .stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; margin-bottom: 32px; }
        .stat-card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; padding: 20px; position: relative; overflow: hidden; }
        .stat-card.blue::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px; background: var(--accent); }
        .stat-value { font-size: 32px; font-weight: 700; margin: 8px 0 4px; font-family: var(--font-mono); }
        
        .table-card { background: var(--surface); border: 1px solid var(--border); border-radius: 12px; overflow: hidden; }
        .table-header { padding: 16px 20px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid var(--border); }
        table { width: 100%; border-collapse: collapse; }
        th { padding: 10px 16px; text-align: left; font-size: 11px; font-family: var(--font-mono); color: var(--muted); background: var(--surface2); }
        td { padding: 12px 16px; font-size: 13px; border-bottom: 1px solid var(--border); }
        
        /* UI COMPONENTS */
        .badge { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 11px; font-family: var(--font-mono); font-weight: 600; }
        .badge-green { background: rgba(16,185,129,0.15); color: var(--green); }
        .badge-red { background: rgba(239,68,68,0.15); color: var(--red); }
        .badge-blue { background: rgba(0,212,255,0.15); color: var(--accent); }
        
        .loading { padding: 60px; text-align: center; color: var(--muted); font-family: var(--font-mono); }
        .spinner { width: 16px; height: 16px; border: 2px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; display: inline-block; margin-right: 8px; }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* MODAL & TOAST */
        .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 200; align-items: center; justify-content: center; }
        .modal-overlay.active { display: flex; }
        .modal { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; width: 500px; max-width: 90vw; }
        .modal-header, .modal-footer { padding: 20px 24px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
        .modal-body { padding: 24px; }
        .form-group { margin-bottom: 16px; }
        .form-label { font-size: 11px; color: var(--muted); text-transform: uppercase; display: block; margin-bottom: 6px; }
        .form-input { width: 100%; background: var(--surface2); border: 1px solid var(--border); color: var(--text); padding: 10px; border-radius: 6px; }

        .toast { position: fixed; bottom: 24px; right: 24px; background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 14px 18px; z-index: 300; transform: translateY(100px); opacity: 0; transition: all 0.3s; }
        .toast.show { transform: translateY(0); opacity: 1; }
    </style>
</head>
<body>

<div class="sidebar">
    <div class="logo">
        <h1>MF<span>Soluciones</span></h1>
        <p>// panel de control</p>
    </div>
    <nav class="nav">
        <div class="nav-section">Principal</div>
        <button class="nav-item active" onclick="showSection('dashboard')"><i class="fas fa-chart-line"></i> Dashboard</button>
        <div class="nav-section">Gestión</div>
        <button class="nav-item" onclick="showSection('socios')"><i class="fas fa-users"></i> Socios</button>
        <button class="nav-item" onclick="showSection('hardware')"><i class="fas fa-microchip"></i> Hardware</button>
        <button class="nav-item" onclick="showSection('ofertas')"><i class="fas fa-tags"></i> Ofertas</button>
    </nav>
    <div class="sidebar-footer">
        <div class="user-info">
            <div class="avatar" id="avatarInitial">M</div>
            <div>
                <div class="name" id="userName">Mariano</div>
                <div class="role">Administrador</div>
            </div>
        </div>
        <button class="logout-btn" onclick="logout()"><i class="fas fa-sign-out-alt"></i> Salir</button>
    </div>
</div>

<div class="main">
    <div class="topbar">
        <div>
            <div class="page-title" id="pageTitle">Dashboard</div>
            <div class="page-subtitle" id="pageSubtitle">Resumen del sistema</div>
        </div>
        <div id="topbarActions"></div>
    </div>

    <div class="content">
        <div class="section active" id="section-dashboard">
            <div class="stats-grid">
                <div class="stat-card blue">
                    <div class="stat-label">Socios</div>
                    <div class="stat-value" id="stat-socios">0</div>
                </div>
                </div>
            <div class="table-card">
                <div class="table-header"><div class="table-title">Actividad Reciente</div></div>
                <div id="dashboard-table"></div>
            </div>
        </div>

        <div class="section" id="section-socios">
            <div class="table-card" id="socios-table"></div>
        </div>
        <div class="section" id="section-hardware">
            <div class="table-card" id="hardware-table"></div>
        </div>
        <div class="section" id="section-ofertas">
            <div class="table-card" id="ofertas-table"></div>
        </div>
    </div>
</div>

<div class="modal-overlay" id="modal">
    <div class="modal">
        <div class="modal-header">
            <h3 id="modal-title">Título</h3>
            <button onclick="closeModal()" style="background:none; border:none; color:white; cursor:pointer;">&times;</button>
        </div>
        <div class="modal-body" id="modal-body"></div>
        <div class="modal-footer" id="modal-footer"></div>
    </div>
</div>

<div class="toast" id="toast"><span id="toast-msg"></span></div>

<script src="config.js"></script>

<script>
// Usamos la API definida en config.js
console.log("Conectando a:", API);

// Inicialización de Usuario
const nombreUsuario = sessionStorage.getItem('nombre') || 'Mariano Fernandez';
document.getElementById('userName').textContent = nombreUsuario.split(' ')[0];
document.getElementById('avatarInitial').textContent = nombreUsuario.charAt(0);

// Función de Fetch Mejorada
// Función de Fetch Mejorada (Con bypass para ngrok)
async function apiFetch(path, opts = {}) {
    try {
        const response = await fetch(`${API}${path}`, {
            method: opts.method || 'GET',
            headers: { 
                'Content-Type': 'application/json',
                // ESTA LÍNEA ES LA CLAVE: salta la advertencia de ngrok
                'ngrok-skip-browser-warning': 'true' 
            },
            body: opts.body ? JSON.stringify(opts.body) : null
        });
        
        if (!response.ok) throw new Error('Error en la respuesta del servidor');
        
        const data = await response.json();
        return data;
    } catch (err) {
        showToast("Error de conexión con el túnel", "error");
        console.error("Error detallado:", err);
        return null;
    }
}

// Gestión de Secciones
function showSection(name) {
    document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
    document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
    
    const target = document.getElementById(`section-${name}`);
    if(target) target.classList.add('active');
    
    event.currentTarget.classList.add('active');
    document.getElementById('pageTitle').textContent = name.charAt(0).toUpperCase() + name.slice(1);
    
    loadData(name);
}

async function loadData(name) {
    const container = document.getElementById(`${name}-table`) || document.getElementById('dashboard-table');
    container.innerHTML = '<div class="loading"><div class="spinner"></div> Cargando datos de MF Soluciones...</div>';
    
    const data = await apiFetch(`/${name}`);
    if (!data) return;

    if (name === 'socios') {
        renderSocios(data);
    } else if (name === 'dashboard') {
        renderDashboard(data);
    }
}

function renderSocios(data) {
    const html = `
        <table>
            <thead>
                <tr><th>Socio</th><th>Nombre</th><th>Legajo</th><th>CRA</th><th>Acciones</th></tr>
            </thead>
            <tbody>
                ${data.map(s => `
                    <tr>
                        <td><span class="badge badge-blue">${s.socio}</span></td>
                        <td>${s.nombre}</td>
                        <td>${s.nro_legajo}</td>
                        <td><span class="badge ${s.cra === 'SI' ? 'badge-green' : 'badge-red'}">${s.cra}</span></td>
                        <td><button class="nav-item" style="padding:4px"><i class="fas fa-edit"></i></button></td>
                    </tr>
                `).join('')}
            </tbody>
        </table>`;
    document.getElementById('socios-table').innerHTML = html;
}

// UI Helpers
function showToast(msg, type) {
    const t = document.getElementById('toast');
    t.querySelector('#toast-msg').textContent = msg;
    t.style.borderLeft = type === 'error' ? '4px solid var(--red)' : '4px solid var(--green)';
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 3000);
}

function closeModal() { document.getElementById('modal').classList.remove('active'); }
function logout() { sessionStorage.clear(); window.location.href = 'index.html'; }

// Carga inicial
loadData('dashboard');
</script>

</body>
</html>
