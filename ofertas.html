<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MF Soluciones | Ofertas</title>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=IBM+Plex+Sans:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --bg: #0a0e1a;
            --surface: #111827;
            --surface2: #1a2236;
            --border: #1e2d45;
            --accent: #00d4ff;
            --text: #e2e8f0;
            --muted: #64748b;
            --green: #10b981;
            --font-mono: 'IBM Plex Mono', monospace;
            --font: 'IBM Plex Sans', sans-serif;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: var(--font);
            display: flex;
            min-height: 100vh;
        }

        /* ── SIDEBAR ── */
        .sidebar {
            width: 240px;
            background: var(--surface);
            border-right: 1px solid var(--border);
            position: fixed;
            height: 100vh;
            padding: 24px 20px;
            z-index: 100;
        }

        .logo h1 {
            font-size: 18px;
            color: var(--accent);
            font-family: var(--font-mono);
            margin-bottom: 30px;
        }

        .nav-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px;
            color: var(--muted);
            text-decoration: none;
            font-size: 14px;
            transition: 0.3s;
            border-radius: 8px;
        }

        .nav-item:hover { background: rgba(255,255,255,0.05); color: var(--text); }
        .nav-item.active { background: rgba(0, 212, 255, 0.1); color: var(--accent); }

        /* ── MAIN ── */
        .main { margin-left: 240px; flex: 1; padding: 40px; }

        .header { margin-bottom: 40px; }
        .header h2 { font-size: 24px; font-weight: 700; }
        .header p { color: var(--muted); font-family: var(--font-mono); font-size: 13px; }

        /* ── GRID ── */
        .offers-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 24px;
        }

        .offer-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            overflow: hidden;
            transition: transform 0.2s;
            position: relative;
        }

        .offer-card:hover { transform: translateY(-5px); border-color: var(--accent); }

        .offer-img {
            width: 100%;
            height: 180px;
            background: var(--surface2);
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .offer-img img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .offer-content { padding: 20px; }
        .offer-title { font-size: 15px; font-weight: 600; margin-bottom: 8px; min-height: 40px; }
        
        .offer-price {
            font-family: var(--font-mono);
            font-size: 22px;
            color: var(--green);
            font-weight: 700;
            margin-bottom: 12px;
        }

        .badge {
            background: rgba(0, 212, 255, 0.1);
            color: var(--accent);
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 11px;
            font-family: var(--font-mono);
            display: inline-block;
            margin-bottom: 8px;
        }

        /* ── BOTÓN DE COMPRA MEJORADO ── */
        .btn-comprar {
            width: 100%;
            background: linear-gradient(135deg, var(--accent) 0%, #00a3ff 100%);
            color: var(--bg);
            border: none;
            padding: 14px;
            border-radius: 10px;
            font-family: var(--font-mono);
            font-weight: 700;
            font-size: 14px;
            text-transform: uppercase;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 4px 15px rgba(0, 212, 255, 0.3);
            margin-top: 15px;
            position: relative;
            overflow: hidden;
        }

        .btn-comprar:hover {
            transform: translateY(-3px) scale(1.02);
            box-shadow: 0 8px 25px rgba(0, 212, 255, 0.5);
            filter: brightness(1.1);
        }

        .btn-comprar i { transition: transform 0.3s ease; }
        .btn-comprar:hover i { transform: translateX(5px); }

        .btn-comprar::after {
            content: '';
            position: absolute;
            top: 0; left: -100%;
            width: 100%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
            transition: 0.5s;
        }
        .btn-comprar:hover::after { left: 100%; }

        .loading { text-align: center; padding: 50px; color: var(--muted); }
        .error { text-align: center; padding: 50px; color: #f87171; font-family: var(--font-mono); font-size: 13px; }

        /* ── RESPONSIVE ── */
        @media (max-width: 768px) {
            .sidebar { transform: translateX(-100%); }
            .main { margin-left: 0; padding: 20px; }
            .offers-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

<div class="sidebar">
    <div class="logo">
        <h1>MF<span>Soluciones</span></h1>
    </div>
    <nav>
        <a href="index.html" class="nav-item"><i class="fas fa-chart-line"></i> Dashboard</a>
        <a href="ofertas.html" class="nav-item active"><i class="fas fa-tags"></i> Ofertas</a>
        <a href="#" class="nav-item"><i class="fas fa-microchip"></i> Hardware</a>
    </nav>
</div>

<div class="main">
    <div class="header">
        <h2>Catálogo de Ofertas</h2>
        <p>// visualización de servicios activos</p>
    </div>

    <div id="loading" class="loading">
        <i class="fas fa-spinner fa-spin"></i> Conectando con la base de datos...
    </div>

    <div class="offers-grid" id="offers-container"></div>
</div>

<script src="config.js"></script>
<script>
    async function fetchOfertas() {
        const loading = document.getElementById('loading');
        const container = document.getElementById('offers-container');

        try {
            // Se usa el encabezado para saltar el aviso de ngrok
            const response = await fetch(`${API_BASE_URL}/ofertas`, {
                headers: { 'ngrok-skip-browser-warning': 'true' }
            });
            
            if (!response.ok) throw new Error(`HTTP ${response.status}`);
            const data = await response.json();

            loading.style.display = 'none';
            container.innerHTML = '';

            data.forEach(item => {
                // Se usa 'nimagen' que es la columna nueva en la DB
                const imgSrc = item.nimagen 
                    ? ASSETS_URL + item.nimagen 
                    : FALLBACK_IMG;

                const card = document.createElement('div');
                card.className = 'offer-card';
                card.innerHTML = `
                    <div class="offer-img">
                        <img src="${imgSrc}" alt="${item.servicio_nombre}" onerror="this.src='${FALLBACK_IMG}';">
                    </div>
                    <div class="offer-content">
                        <span class="badge">${item.servicio_nombre || 'SERVICIO'}</span>
                        <h3 class="offer-title">${item.oferta_texto || 'Sin descripción'}</h3>
                        <div class="offer-price">$${item.precio || '0.00'}</div>
                        <p style="font-size:11px; color:var(--muted); font-family:'IBM Plex Mono';">
                            Expira: ${item.fecha_expiracion || 'Consultar'}
                        </p>
                        <button class="btn-comprar" onclick="iniciarCompra(${item.id}, '${item.servicio_nombre}', ${item.precio})">
                            <span>Comprar Ahora</span>
                            <i class="fas fa-shopping-cart"></i>
                        </button>
                    </div>
                `;
                container.appendChild(card);
            });

        } catch (error) {
            console.error('Error al cargar ofertas:', error);
            loading.className = 'error';
            loading.innerHTML = `<i class="fas fa-exclamation-triangle"></i> Error al conectar con la API.<br><small>${error.message}</small>`;
        }
    }

    function iniciarCompra(id, nombre, precio) {
        const mensaje = `Hola Mariano! Me interesa el servicio: *${nombre}* ($${precio}). Ref: #${id}`;
        const whatsappUrl = `https://wa.me/543424123456?text=${encodeURIComponent(mensaje)}`; // Cambia por tu número real
        
        const btn = event.currentTarget;
        const originalContent = btn.innerHTML;
        
        btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Procesando...';
        btn.style.opacity = '0.7';
        
        setTimeout(() => {
            window.open(whatsappUrl, '_blank');
            btn.innerHTML = originalContent;
            btn.style.opacity = '1';
        }, 800);
    }

    window.onload = fetchOfertas;
</script>

</body>
</html>
