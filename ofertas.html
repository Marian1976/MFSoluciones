<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MF Soluciones | Ofertas</title>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=IBM+Plex+Sans:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --bg: #0a0e1a;
            --surface: #111827;
            --surface2: #1a2236;
            --border: #1e2d45;
            --accent: #00d4ff;
            --text: #e2e8f0;
            --muted: #64748b;
            --green: #10b981;
            --font-mono: 'IBM Plex Mono', monospace;
            --font: 'IBM Plex Sans', sans-serif;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: var(--font);
            display: flex;
            min-height: 100vh;
        }

        /* ── SIDEBAR ── */
        .sidebar {
            width: 240px;
            background: var(--surface);
            border-right: 1px solid var(--border);
            position: fixed;
            height: 100vh;
            padding: 24px 20px;
            z-index: 100;
        }

        .logo h1 {
            font-size: 18px;
            color: var(--accent);
            font-family: var(--font-mono);
            margin-bottom: 30px;
        }

        .nav-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px;
            color: var(--muted);
            text-decoration: none;
            font-size: 14px;
            transition: 0.3s;
            border-radius: 8px;
        }

        .nav-item:hover { background: rgba(255,255,255,0.05); color: var(--text); }
        .nav-item.active { background: rgba(0, 212, 255, 0.1); color: var(--accent); }

        /* ── MAIN ── */
        .main { margin-left: 240px; flex: 1; padding: 40px; }

        .header { margin-bottom: 40px; }
        .header h2 { font-size: 24px; font-weight: 700; }
        .header p { color: var(--muted); font-family: var(--font-mono); font-size: 13px; }

        /* ── GRID ── */
        .offers-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 24px;
        }

        .offer-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 12px;
            overflow: hidden;
            transition: transform 0.2s;
        }

        .offer-card:hover { transform: translateY(-5px); border-color: var(--accent); }

        .offer-img {
            width: 100%;
            height: 180px;
            background: var(--surface2);
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        .offer-img img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .offer-content { padding: 20px; }
        .offer-title { font-size: 15px; font-weight: 600; margin-bottom: 8px; min-height: 40px; }
        .offer-price {
            font-family: var(--font-mono);
            font-size: 20px;
            color: var(--green);
            font-weight: 700;
            margin-bottom: 12px;
        }

        .badge {
            background: rgba(0, 212, 255, 0.1);
            color: var(--accent);
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 11px;
            font-family: var(--font-mono);
            display: inline-block;
            margin-bottom: 8px;
        }

        .loading { text-align: center; padding: 50px; color: var(--muted); }
        .error { text-align: center; padding: 50px; color: #f87171; font-family: var(--font-mono); font-size: 13px; }

        /* ── HAMBURGUESA (solo móvil) ── */
        .hamburger {
            display: none;
            position: fixed;
            top: 14px;
            left: 14px;
            z-index: 200;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 10px 13px;
            cursor: pointer;
            color: var(--accent);
            font-size: 18px;
            line-height: 1;
        }

        /* ── OVERLAY ── */
        .overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.55);
            z-index: 90;
        }
        .overlay.active { display: block; }

        /* ── RESPONSIVE ── */
        @media (max-width: 768px) {
            .hamburger { display: block; }

            .sidebar {
                transform: translateX(-100%);
                transition: transform 0.28s ease;
            }
            .sidebar.open { transform: translateX(0); }

            .main {
                margin-left: 0;
                padding: 70px 16px 32px;
            }

            .offers-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>

<!-- Botón hamburguesa -->
<button class="hamburger" id="menuBtn" aria-label="Abrir menú">
    <i class="fas fa-bars" id="menuIcon"></i>
</button>

<!-- Overlay oscuro -->
<div class="overlay" id="overlay"></div>

<div class="sidebar" id="sidebar">
    <div class="logo">
        <h1>MF<span>Soluciones</span></h1>
    </div>
    <nav>
        <a href="index.html" class="nav-item"><i class="fas fa-chart-line"></i> Dashboard</a>
        <a href="ofertas.html" class="nav-item active"><i class="fas fa-tags"></i> Ofertas</a>
        <a href="#" class="nav-item"><i class="fas fa-microchip"></i> Hardware</a>
    </nav>
</div>

<div class="main">
    <div class="header">
        <h2>Catálogo de Ofertas</h2>
        <p>// visualización de servicios activos</p>
    </div>

    <div id="loading" class="loading">
        <i class="fas fa-spinner fa-spin"></i> Conectando con la base de datos...
    </div>

    <div class="offers-grid" id="offers-container"></div>
</div>

<script src="config.js"></script>
<script>
    // ► La URL del túnel y los assets se leen desde config.js — no toques este archivo

    // ── Menú hamburguesa ──
    const menuBtn  = document.getElementById('menuBtn');
    const sidebar  = document.getElementById('sidebar');
    const overlay  = document.getElementById('overlay');
    const menuIcon = document.getElementById('menuIcon');

    function toggleMenu() {
        const open = sidebar.classList.toggle('open');
        overlay.classList.toggle('active', open);
        menuIcon.className = open ? 'fas fa-times' : 'fas fa-bars';
    }

    menuBtn.addEventListener('click', toggleMenu);
    overlay.addEventListener('click', toggleMenu);

    // Cerrar menú al tocar un link
    document.querySelectorAll('.nav-item').forEach(link => {
        link.addEventListener('click', () => {
            if (sidebar.classList.contains('open')) toggleMenu();
        });
    });

    // ── API — valores definidos en config.js ──

    async function fetchOfertas() {
        const loading   = document.getElementById('loading');
        const container = document.getElementById('offers-container');

        try {
            const response = await fetch(`${API_BASE_URL}/ofertas`);
            if (!response.ok) throw new Error(`HTTP ${response.status}`);
            const data = await response.json();

            loading.style.display = 'none';
            container.innerHTML = '';

            data.forEach(item => {
                const imgSrc = item.imagen
                    ? ASSETS_URL + item.imagen
                    : FALLBACK_IMG;

                const card = document.createElement('div');
                card.className = 'offer-card';
                card.innerHTML = `
                    <div class="offer-img">
                        <img
                            src="${imgSrc}"
                            alt="Imagen Oferta"
                            loading="eager"
                            onerror="this.onerror=null; this.src='${FALLBACK_IMG}';"
                        >
                    </div>
                    <div class="offer-content">
                        <span class="badge">${item.servicio_nombre || 'SERVICIO'}</span>
                        <h3 class="offer-title">${item.oferta_texto || 'Sin descripción'}</h3>
                        <div class="offer-price">$${item.precio || '0.00'}</div>
                        <p style="font-size:11px; color:var(--muted); font-family:'IBM Plex Mono';">
                            Expira: ${item.fecha_expiracion || 'Consultar'}
                        </p>
                    </div>
                `;
                container.appendChild(card);
            });

        } catch (error) {
            console.error('Error al cargar ofertas:', error);
            loading.className = 'error';
            loading.innerHTML = `<i class="fas fa-exclamation-triangle"></i> Error al conectar con la API.<br><small>${error.message}</small>`;
        }
    }

    window.onload = fetchOfertas;
</script>

</body>
</html>
